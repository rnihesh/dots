# for reloading cong ctrl+b r
unbind r
bind r source-file ~/.tmux.conf


# Automatically set new panes/windows to start in the current directory
bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

set-option -g status-position top 

set -g status on

# resize using mouse
set -g mouse on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_status_background "default"

set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_connect_separator "no"


set -g status-right-length 200
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right " #{E:@catppuccin_status_session}"



run '~/.tmux/plugins/tpm/tpm'

# for fuzzy switching between windows ctrl+b w
unbind w
bind-key w display-popup -E -w 85% -h 85% "\
  tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name} #{window_flags}' |\
  /opt/homebrew/bin/fzf \
    --reverse \
    --border \
    --prompt=' ' \
    --pointer='>' \
    --preview='tmux capture-pane -e -p -t {1}' \
    --preview-window='right:50%:wrap' \
    --bind='ctrl-o:toggle-preview' \
  |\
  cut -d ' ' -f 1 |\
  xargs tmux switch-client -t"

# 1. Make the main status bar background transparent
set -g status-bg default
set -g status-style bg=default
