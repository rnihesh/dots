# for reloading cong ctrl+b R
unbind R
bind R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"


# Automatically set new panes/windows to start in the current directory
bind '%' split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

set-option -g status-position top 

set -g status on

# resize using mouse
set -g mouse on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_status_background "default"

set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_connect_separator "no"


set -g status-right-length 200
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right " #{E:@catppuccin_status_session}"



run '~/.tmux/plugins/tpm/tpm'

# for fuzzy switching between windows ctrl+b w
unbind w
bind-key w display-popup -E -w 85% -h 85% "\
  tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name} #{window_flags}' |\
  /opt/homebrew/bin/fzf \
    --reverse \
    --border \
    --prompt=' ' \
    --pointer='>' \
    --preview='tmux capture-pane -e -p -t {1}' \
    --preview-window='right:50%:wrap' \
    --bind='ctrl-o:toggle-preview' \
  |\
  cut -d ' ' -f 1 |\
  xargs tmux switch-client -t"

# 1. Make the main status bar background transparent
set -g status-bg default
set -g status-style bg=default

# 2. Fix window pills: catppuccin draws the rounded caps over the theme's
# status background (mantle) instead of the terminal default, which leaves
# dark square corners once the bar is transparent. Redefine the formats with
# explicit caps on bg=default so windows render as clean capsules, same as
# the status modules on the right. Flag icons (current/zoom/bell/...) kept.
set -gF window-status-format "#[fg=##{?window_bell_flag,#{@thm_yellow},##{?window_activity_flag,#{@thm_lavender},#{@thm_overlay_2}}},bg=default]#[fg=#{@thm_crust},bg=##{?window_bell_flag,#{@thm_yellow},##{?window_activity_flag,#{@thm_lavender},#{@thm_overlay_2}}}]##I #[fg=#{@thm_fg},bg=#{@thm_surface_0}] ##W#{E:@catppuccin_window_flags_icon_format}#[fg=#{@thm_surface_0},bg=default]"
set -gF window-status-current-format "#[fg=##{?window_bell_flag,#{@thm_yellow},##{?window_activity_flag,#{@thm_lavender},#{@thm_mauve}}},bg=default]#[fg=#{@thm_crust},bg=##{?window_bell_flag,#{@thm_yellow},##{?window_activity_flag,#{@thm_lavender},#{@thm_mauve}}}]##I #[fg=#{@thm_fg},bg=#{@thm_surface_1}] ##W#{E:@catppuccin_window_flags_icon_format}#[fg=#{@thm_surface_1},bg=default]"
# Bell/activity: plugin paints the whole entry bg (yellow/lavender), which
# refills the transparent cap cells -> corner boxes. Neutralize the overlay
# styles; the colour cue moves into the number box + left cap via the
# conditionals above. Flag icons unchanged.
set -g window-status-bell-style "default"
set -g window-status-activity-style "default"
